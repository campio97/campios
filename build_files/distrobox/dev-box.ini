# CampiOS — manifest `distrobox assemble` per la dev-box.
#
# Ambiente di sviluppo CampiOS: NON vive nell'immagine immutabile, ma in una
# distrobox per-utente (podman rootless, storage nella home mutabile) creata al
# primo login da campios-create-devbox. Dentro stanno VSCode, Rust/Cargo e Python.
#
# Letto da `distrobox assemble create --file`. Chiavi note di assemble:
#   additional_packages  pacchetti installati col gestore dell'immagine (dnf)
#   init_hooks           comandi eseguiti DENTRO il container alla creazione
#                        (righe cumulative: vengono concatenate con '&&')
#   exported_apps/_bins  esporta launcher .desktop e binari verso l'host
#
# NB: niente ' #' (spazio-cancelletto) nei valori: assemble lo tratta come
# commento inline e lo taglia.

[dev-box]
image=registry.fedoraproject.org/fedora-toolbox:latest

# Python, Rust/Cargo + strumenti di sviluppo, toolchain di build C.
additional_packages="git python3 python3-pip python3-virtualenv python3-devel cargo rust rust-src rustfmt clippy gcc gcc-c++ make"

# VSCode dal repo ufficiale Microsoft (non c'è nei repo Fedora).
init_hooks="rpm --import https://packages.microsoft.com/keys/microsoft.asc"
init_hooks="printf '[code]\nname=Visual Studio Code\nbaseurl=https://packages.microsoft.com/yumrepos/vscode\nenabled=1\nautorefresh=1\ntype=rpm-md\ngpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc\n' > /etc/yum.repos.d/vscode.repo"
init_hooks="dnf install -y code"

# Porta VSCode nel menu dell'host e il comando `code` in ~/.local/bin.
exported_apps="code"
exported_bins="/usr/bin/code"
